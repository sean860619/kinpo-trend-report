<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LibTV 腳本節點完整流程</title>
<style>
:root {
  --bg: #0d0d12;
  --s1: #161620;
  --s2: #1e1e2a;
  --s3: #252535;
  --border: #2a2a3e;
  --accent: #7c5cfc;
  --accent-soft: rgba(124,92,252,.15);
  --green: #22c55e;
  --green-soft: rgba(34,197,94,.12);
  --yellow: #f59e0b;
  --yellow-soft: rgba(245,158,11,.12);
  --red: #ef4444;
  --red-soft: rgba(239,68,68,.12);
  --blue: #38bdf8;
  --blue-soft: rgba(56,189,248,.12);
  --text: #e2e8f0;
  --muted: #64748b;
  --muted2: #475569;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'Segoe UI', 'PingFang TC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; }

/* ─── Sidebar ─── */
.sidebar {
  width: 270px; min-height: 100vh; background: var(--s1);
  border-right: 1px solid var(--border); position: fixed;
  top: 0; left: 0; bottom: 0; overflow-y: auto; z-index: 20;
}
.logo { padding: 20px 18px 16px; border-bottom: 1px solid var(--border); }
.logo h2 { font-size: 14px; font-weight: 800; color: #a78bfa; display: flex; align-items: center; gap: 6px; }
.logo p { font-size: 11px; color: var(--muted); margin-top: 3px; }

/* Progress */
.prog-wrap { margin: 12px; background: var(--s2); border: 1px solid var(--border); border-radius: 10px; padding: 12px; }
.prog-bar-bg { background: var(--s3); border-radius: 6px; height: 6px; margin-top: 8px; }
.prog-bar-fill { background: linear-gradient(90deg, var(--accent), #a78bfa); height: 6px; border-radius: 6px; transition: width .4s ease; }
.prog-label { display: flex; justify-content: space-between; font-size: 11px; }
.prog-label .done-count { color: #a78bfa; font-weight: 700; }
.prog-label .total { color: var(--muted); }

/* Nav */
.nav { padding: 10px 8px; }
.nav-group-label { font-size: 10px; font-weight: 700; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; padding: 12px 10px 4px; }
.nav-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px; border-radius: 7px; cursor: pointer;
  font-size: 12.5px; color: var(--muted); text-decoration: none;
  transition: all .15s; position: relative;
}
.nav-item:hover { background: var(--s2); color: var(--text); }
.nav-item.active { background: var(--accent-soft); color: #a78bfa; }
.nav-item.done-nav { color: var(--green); }
.nav-num {
  width: 20px; height: 20px; border-radius: 50%; display: flex;
  align-items: center; justify-content: center; font-size: 10px;
  font-weight: 700; flex-shrink: 0; background: var(--s3);
  border: 1.5px solid var(--border); color: var(--muted2);
}
.nav-item.active .nav-num { background: var(--accent); border-color: var(--accent); color: #fff; }
.nav-item.done-nav .nav-num { background: var(--green); border-color: var(--green); color: #fff; }

/* ─── Main ─── */
.main { margin-left: 270px; flex: 1; padding: 28px 32px 80px; max-width: 960px; }

.page-header { margin-bottom: 28px; }
.page-header h1 { font-size: 24px; font-weight: 800; line-height: 1.2; }
.page-header h1 span { color: #a78bfa; }
.page-header p { color: var(--muted); margin-top: 6px; font-size: 13px; }
.header-links { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
.header-links a {
  font-size: 11.5px; padding: 4px 12px; border-radius: 20px;
  border: 1px solid var(--border); color: #a78bfa; text-decoration: none;
  background: var(--accent-soft); transition: background .15s;
}
.header-links a:hover { background: rgba(124,92,252,.25); }

/* Phase label */
.phase-label {
  display: flex; align-items: center; gap: 10px;
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .1em; color: var(--muted); margin: 24px 0 10px;
}
.phase-label::before, .phase-label::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}

/* ─── Step Card ─── */
.card {
  background: var(--s1); border: 1px solid var(--border);
  border-radius: 14px; margin-bottom: 12px; overflow: hidden;
  transition: border-color .2s, box-shadow .2s; scroll-margin-top: 20px;
}
.card.open { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft); }
.card.done-card { border-color: rgba(34,197,94,.35); }
.card.open.done-card { border-color: var(--green); box-shadow: 0 0 0 2px var(--green-soft); }

.card-head {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 18px; cursor: pointer; user-select: none;
}
.card-icon {
  width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; background: var(--s2); border: 1.5px solid var(--border);
}
.card.open .card-icon { border-color: var(--accent); background: var(--accent-soft); }
.card.done-card .card-icon { border-color: var(--green); background: var(--green-soft); }
.card-info { flex: 1; min-width: 0; }
.card-info h3 { font-size: 14px; font-weight: 700; }
.card-info p { font-size: 11.5px; color: var(--muted); margin-top: 2px; }
.card-right { display: flex; align-items: center; gap: 8px; }
.tag {
  font-size: 10.5px; font-weight: 700; padding: 3px 9px;
  border-radius: 20px; white-space: nowrap;
}
.tag-purple { background: var(--accent-soft); color: #a78bfa; border: 1px solid rgba(124,92,252,.3); }
.tag-green { background: var(--green-soft); color: var(--green); border: 1px solid rgba(34,197,94,.3); }
.tag-yellow { background: var(--yellow-soft); color: var(--yellow); border: 1px solid rgba(245,158,11,.3); }
.tag-red { background: var(--red-soft); color: var(--red); border: 1px solid rgba(239,68,68,.3); }
.chevron { font-size: 10px; color: var(--muted); transition: transform .2s; }
.card.open .chevron { transform: rotate(180deg); }

.card-body { display: none; padding: 0 18px 18px; }
.card.open .card-body { display: block; }
.card-divider { height: 1px; background: var(--border); margin: 0 18px 16px; }

/* ─── Steps inside card ─── */
.steps-list { list-style: none; counter-reset: step; }
.step-item {
  display: flex; gap: 12px; padding: 10px 0;
  border-bottom: 1px solid var(--border); cursor: pointer;
  transition: opacity .15s;
}
.step-item:last-child { border-bottom: none; }
.step-item.checked { opacity: .55; }
.step-cb {
  width: 22px; height: 22px; border-radius: 6px; flex-shrink: 0;
  border: 1.5px solid var(--border); background: var(--s2);
  display: flex; align-items: center; justify-content: center;
  margin-top: 1px; transition: all .15s;
}
.step-item.checked .step-cb { background: var(--green); border-color: var(--green); }
.step-cb-tick { display: none; width: 6px; height: 10px; border: 2px solid #fff; border-top: none; border-left: none; transform: rotate(45deg) translateY(-1px); }
.step-item.checked .step-cb-tick { display: block; }
.step-text { flex: 1; }
.step-text .main-text { font-size: 13.5px; line-height: 1.55; }
.step-text .sub-text { font-size: 11.5px; color: var(--muted); margin-top: 3px; line-height: 1.5; }
.step-text .sub-text code { background: var(--s3); border: 1px solid var(--border); border-radius: 4px; padding: 1px 6px; font-size: 11px; color: #a78bfa; font-family: 'SF Mono', monospace; }

/* Tips */
.tip-box {
  display: flex; gap: 10px; padding: 11px 13px; border-radius: 8px;
  font-size: 12.5px; line-height: 1.6; margin: 12px 0;
}
.tip-box.info { background: var(--blue-soft); border-left: 3px solid var(--blue); }
.tip-box.warn { background: var(--yellow-soft); border-left: 3px solid var(--yellow); }
.tip-box.danger { background: var(--red-soft); border-left: 3px solid var(--red); }
.tip-box.success { background: var(--green-soft); border-left: 3px solid var(--green); }
.tip-box.purple { background: var(--accent-soft); border-left: 3px solid var(--accent); }
.tip-box .tip-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
.tip-box .tip-content strong { display: block; margin-bottom: 3px; }

/* Flow path visual */
.flow-path {
  display: flex; align-items: center; gap: 6px;
  flex-wrap: wrap; margin: 10px 0; padding: 10px 12px;
  background: var(--s2); border-radius: 8px; border: 1px solid var(--border);
}
.flow-node {
  font-size: 11.5px; padding: 4px 10px; border-radius: 6px;
  background: var(--s3); border: 1px solid var(--border); color: var(--text);
  white-space: nowrap;
}
.flow-node.hl { background: var(--accent-soft); border-color: rgba(124,92,252,.4); color: #a78bfa; font-weight: 700; }
.flow-node.done-node { background: var(--green-soft); border-color: rgba(34,197,94,.4); color: var(--green); }
.flow-arrow { color: var(--muted); font-size: 12px; }

/* Table */
.info-table { width: 100%; border-collapse: collapse; font-size: 12px; margin: 10px 0; }
.info-table th { background: var(--s2); padding: 7px 12px; text-align: left; color: var(--muted); font-weight: 600; border: 1px solid var(--border); font-size: 11px; text-transform: uppercase; letter-spacing: .05em; }
.info-table td { padding: 8px 12px; border: 1px solid var(--border); vertical-align: top; line-height: 1.5; }
.info-table td:first-child { color: #a78bfa; font-weight: 600; white-space: nowrap; }

/* Complete btn */
.actions { margin-top: 14px; display: flex; gap: 8px; align-items: center; }
.btn-done {
  padding: 7px 18px; border-radius: 7px; font-size: 12.5px;
  font-weight: 700; cursor: pointer; border: none; transition: all .15s;
  background: var(--accent); color: #fff;
}
.btn-done:hover { background: #6a4ae8; }
.btn-done.undone { background: var(--s2); color: var(--muted); border: 1px solid var(--border); }
.btn-done.undone:hover { background: var(--s3); color: var(--text); }
.done-badge { font-size: 12px; color: var(--green); font-weight: 600; display: none; }
.card.done-card .done-badge { display: block; }

/* Keyboard shortcut */
.kbd {
  display: inline-block; padding: 1px 7px; border-radius: 4px;
  background: var(--s2); border: 1px solid var(--border);
  font-size: 11px; font-family: monospace; color: var(--text);
}

/* Toast */
.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--green); color: #fff; padding: 12px 20px;
  border-radius: 10px; font-size: 13.5px; font-weight: 700;
  box-shadow: 0 8px 30px rgba(0,0,0,.5); z-index: 100;
  transform: translateY(20px); opacity: 0;
  transition: all .3s ease; pointer-events: none;
}
.toast.show { transform: translateY(0); opacity: 1; }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>

// ────────────────────────────────────────────
// STATE
// ────────────────────────────────────────────
const raw = JSON.parse(localStorage.getItem('ltv2_state') || '{}');
const state = {}; // cardId -> Set<stepIdx>
const cardDone = {}; // cardId -> bool

const allCards = PHASES.flatMap(p => p.cards);
allCards.forEach(c => {
  state[c.id] = new Set(raw[c.id]?.steps || []);
  cardDone[c.id] = raw[c.id]?.done || false;
});

function save() {
  const obj = {};
  allCards.forEach(c => { obj[c.id] = { steps: [...state[c.id]], done: cardDone[c.id] }; });
  localStorage.setItem('ltv2_state', JSON.stringify(obj));
}

// ────────────────────────────────────────────
// BUILD
// ────────────────────────────────────────────
function buildGlobalFlow() {
  const labels = ['建腳本節點', '生成劇本', '確認鏡頭', '全螢幕修改', '準備資產', '合成提示詞', '批量分鏡', '轉換影片', '後製輸出'];
  const el = document.getElementById('globalFlow');
  el.innerHTML = labels.map((l, i) => `<span class="flow-node${i===6||i===7?' hl':''}">${l}</span>${i<labels.length-1?'<span class="flow-arrow">›</span>':''}`).join('');
}

function buildNav() {
  const nav = document.getElementById('navEl');
  nav.innerHTML = '';
  let idx = 0;
  PHASES.forEach(ph => {
    const gl = document.createElement('div');
    gl.className = 'nav-group-label';
    gl.textContent = ph.label;
    nav.appendChild(gl);
    ph.cards.forEach(c => {
      idx++;
      const a = document.createElement('a');
      a.className = 'nav-item' + (cardDone[c.id] ? ' done-nav' : '');
      a.href = '#' + c.id;
      a.dataset.id = c.id;
      a.innerHTML = `<span class="nav-num">${cardDone[c.id] ? '✓' : idx}</span><span style="flex:1">${c.title}</span>`;
      a.addEventListener('click', e => {
        e.preventDefault();
        document.getElementById(c.id)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
        openCard(c.id);
      });
      nav.appendChild(a);
    });
  });
}

function buildCards() {
  const wrap = document.getElementById('cardsWrap');
  wrap.innerHTML = '';
  PHASES.forEach(ph => {
    const pl = document.createElement('div');
    pl.className = 'phase-label';
    pl.textContent = ph.label;
    wrap.appendChild(pl);

    ph.cards.forEach(c => {
      const done = cardDone[c.id];
      const el = document.createElement('div');
      el.className = 'card' + (done ? ' done-card' : '');
      el.id = c.id;

      const flowHtml = c.flow ? `
        <div class="flow-path">
          ${c.flow.map((f,i) => `<span class="flow-node">${f}</span>${i<c.flow.length-1?'<span class="flow-arrow">›</span>':''}`).join('')}
        </div>` : '';

      const stepsHtml = c.steps.map((s, i) => {
        const checked = state[c.id].has(i);
        const sub = s.sub ? s.sub.split('\n').map(l => `<span class="sub-text">${l}</span>`).join('') : '';
        return `<li class="step-item${checked?' checked':''}" data-card="${c.id}" data-idx="${i}">
          <span class="step-cb"><span class="step-cb-tick"></span></span>
          <span class="step-text">
            <span class="main-text">${s.text}</span>
            ${s.sub ? `<span class="sub-text">${s.sub.replace(/\n/g,'<br>')}</span>` : ''}
          </span>
        </li>`;
      }).join('');

      const tipsHtml = (c.tips || []).map(t => `
        <div class="tip-box ${t.type}">
          <span class="tip-icon">${t.icon}</span>
          <div class="tip-content"><strong>${t.title}</strong>${t.body}</div>
        </div>`).join('');

      el.innerHTML = `
        <div class="card-head">
          <div class="card-icon">${done ? '✅' : c.icon}</div>
          <div class="card-info">
            <h3>${c.title}</h3>
            <p>${c.desc}</p>
          </div>
          <div class="card-right">
            <span class="tag ${c.tagClass}">${c.tag}</span>
            <span class="chevron">▼</span>
          </div>
        </div>
        <div class="card-divider"></div>
        <div class="card-body">
          ${flowHtml}
          <ul class="steps-list">${stepsHtml}</ul>
          ${tipsHtml}
          <div class="actions">
            <button class="btn-done${done?' undone':''}" data-card="${c.id}">${done?'↩ 標記為未完成':'✓ 標記此步驟完成'}</button>
            <span class="done-badge">✅ 已完成</span>
          </div>
        </div>`;
      wrap.appendChild(el);
    });
  });
  updateProgress();
}

function openCard(id) {
  document.querySelectorAll('.card').forEach(el => {
    if (el.id === id) el.classList.add('open');
    else el.classList.remove('open');
  });
  document.querySelectorAll('.nav-item').forEach(n => {
    n.classList.toggle('active', n.dataset.id === id);
  });
}

function updateProgress() {
  const total = allCards.length;
  const done = allCards.filter(c => cardDone[c.id]).length;
  const pct = Math.round(done / total * 100);
  document.getElementById('doneCount').textContent = done + ' 步完成';
  document.getElementById('totalCount').textContent = '共 ' + total + ' 步';
  document.getElementById('progFill').style.width = pct + '%';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ────────────────────────────────────────────
// EVENTS
// ────────────────────────────────────────────
document.getElementById('cardsWrap').addEventListener('click', e => {
  // Step checkbox
  const li = e.target.closest('.step-item');
  if (li) {
    const { card, idx } = li.dataset;
    const i = parseInt(idx);
    if (state[card].has(i)) state[card].delete(i);
    else state[card].add(i);
    li.classList.toggle('checked', state[card].has(i));
    save();
    return;
  }

  // Done button
  const btn = e.target.closest('.btn-done');
  if (btn) {
    const id = btn.dataset.card;
    cardDone[id] = !cardDone[id];
    save();
    buildNav();
    buildCards();
    openCard(id);
    if (cardDone[id]) showToast('✅ 步驟完成！繼續下一步');
    return;
  }

  // Card header toggle
  const head = e.target.closest('.card-head');
  if (head) {
    const card = head.closest('.card');
    if (card.classList.contains('open')) card.classList.remove('open');
    else openCard(card.id);
  }
});

// ────────────────────────────────────────────
// INIT
// ────────────────────────────────────────────
buildGlobalFlow();
buildNav();
buildCards();
openCard(allCards[0].id);
</script>
